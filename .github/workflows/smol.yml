name: Pack smolmachine

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install smolvm
        run: |
          curl -sSL https://smolmachines.com/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create Smolfile for opencode
        run: |
          cat > Smolfile << 'EOF'
          image = "ubuntu:24.04"
          net = true
          [dev]
          init = [
            "curl -fsSL https://opencode.ai/install | bash",
            "ln -sf /root/.opencode/bin/opencode /usr/local/bin/opencode"
          ]
          EOF

      - name: Pack opencode into a .smolmachine
        run: |
          smolvm pack create \
            --image ubuntu:24.04 \
            -o ./opencode-smolmachine

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-smolmachine
          path: ./opencode-smolmachine
          retention-days: 30

  release:
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: opencode-smolmachine
          path: .

      - name: Make executable
        run: chmod +x ./opencode-smolmachine

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./opencode-smolmachine
          generate_release_notes: true
